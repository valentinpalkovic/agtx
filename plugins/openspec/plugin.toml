name = "openspec"
description = "OpenSpec - lightweight AI-guided specification framework"
# No init_script — openspec must be initialized in the project root first (openspec init).
# The openspec/ directory (containing change specs) is copied to worktrees automatically.
copy_dirs = ["openspec"]

[artifacts]
planning = "openspec/changes/*/proposal.md"

[commands]
planning = "/opsx:propose {task}"
running = "/opsx:apply"

[prompts]
# propose takes {task} inline in the command — no separate prompt needed
review = "Review the implementation: run the relevant tests, verify the fix is correct and complete, and confirm no regressions. Report results."

[copy_back]
planning = ["openspec"]
